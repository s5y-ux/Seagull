<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="/style.css" />
<meta name="description" content="Contact Seagull Technologies — reach out to collaborate or ask questions." />
<meta name="theme-color" content="#000000" />
<title>Contact Seagull Technologies LLC</title>

<style>
/* Keep navbar normal */
.navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: rgba(0,0,0,0.65);
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2rem;
  z-index: 1000;
  font-family: "Roboto Mono", monospace;
  backdrop-filter: blur(10px);
}

.navbar-links {
  list-style: none;
  display: flex;
  gap: 1.5rem;
  margin: 0;
  padding: 0;
}

.navbar-links li a {
  color: white;
  text-decoration: none;
  font-size: 1rem;
  transition: color 0.3s ease;
}

.navbar-links li a:hover {
  color: #5d5d5e;
}

.navbar-links .submenu {
  display: none;
  position: absolute;
  background: rgba(0,0,0,0.85);
  padding: 0.5rem 0;
  list-style: none;
  margin: 0;
  top: 100%;
  left: 0;
  min-width: 200px;
  z-index: 1001;
  border-radius: 4px;
}

.navbar-links .submenu li a {
  display: block;
  padding: 0.5rem 1rem;
  color: white;
  text-decoration: none;
}

.navbar-links .submenu li a:hover {
  background-color: #00ffff;
  color: black;
}

.has-submenu {
  position: relative;
}

.has-submenu:hover .submenu {
  display: block;
}

/* Hamburger (hidden on desktop) */
.hamburger {
  display: none;
  background: none;
  border: none;
  color: white;
  font-size: 1.6rem;
  cursor: pointer;
  padding: 0.4rem 0.6rem;
  line-height: 1;
}

/* === Mobile === */
@media (max-width: 768px) {
  .hamburger { display: block; }

  .navbar-links {
    display: none;
    flex-direction: column;
    position: fixed;
    top: 60px;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.97);
    backdrop-filter: blur(10px);
    padding: 0.5rem 0 1rem;
    gap: 0;
    z-index: 998;
    border-top: 1px solid rgba(255,255,255,0.15);
  }

  .navbar-links.open { display: flex; }

  .navbar-links li { width: 100%; position: static; }

  .navbar-links li a {
    display: block;
    padding: 0.85rem 2rem;
    font-size: 1.05rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .navbar-links .submenu {
    display: none;
    position: static;
    background: rgba(255,255,255,0.05);
    box-shadow: none;
    border-radius: 0;
    min-width: unset;
    padding: 0;
    margin: 0;
  }

  .has-submenu:hover .submenu { display: none; }
  .navbar-links .submenu.open { display: block !important; }

  .navbar-links .submenu li a {
    padding: 0.7rem 3rem;
    font-size: 0.95rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .contact-wrapper { padding: 80px 1rem 2rem; }
}

/* Contact page content */
body.contact-page {
  background-color: #000;
  color: #fff;
  font-family: "Roboto Mono", monospace;
  margin: 0;
}

.contact-wrapper {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 100px 2rem 2rem; /* leave space for navbar */
}

.contact-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  width: 100%;
  max-width: 400px;
}

.contact-form label {
  text-align: left;
  font-size: 0.85rem;
  color: #aaa;
  margin-bottom: 0.2rem;
}

.contact-form input,
.contact-form textarea {
  padding: 0.75rem;
  border: 1px solid #555;
  border-radius: 4px;
  background-color: #111;
  color: #fff;
  font-family: "Roboto Mono", monospace;
  font-size: 1rem;
}

.contact-form input::placeholder,
.contact-form textarea::placeholder {
  color: #888;
}

.contact-form button {
  padding: 0.75rem;
  background-color: #ffffff;
  color: #000;
  font-weight: bold;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-family: "Roboto Mono", monospace;
}

.contact-form button:hover {
  background-color: #00ffff;
}
</style>
</head>

<body class="contact-page">

<nav class="navbar">
  <div class="navbar-logo">Seagull Technologies<br/> Ventura CA.</div>
  <button class="hamburger" id="hamburger" aria-label="Toggle menu">&#9776;</button>
  <ul class="navbar-links" id="navbar-links">
    <li><a href="index.html">Home</a></li>
    <li class="has-submenu">
      <a href="#">Products</a>
      <ul class="submenu">
        <li><a href="https://www.politiciantradetracker.us/">Politician Trade Tracker API</a></li>
      </ul>
    </li>
    <li><a href="About.html">About</a></li>
    <li><a href="Contact.html">Contact</a></li>
    <li><a href="https://www.linkedin.com/company/seagull-technologiesl/" target="_blank" rel="noopener noreferrer">LinkedIn</a></li>
    <li><a href="https://github.com/Seagull-Technologies" target="_blank" rel="noopener noreferrer">GitHub</a></li>
  </ul>
</nav>

<div class="contact-wrapper">
  <h1>Contact Us</h1>
  <p>Have questions or want to collaborate? Fill out the form below.</p>

  <form class="contact-form" action="mailto:joseph.shumaker@seagulltech.us" method="post" enctype="text/plain">
    <label for="name">Name</label>
    <input id="name" type="text" name="name" placeholder="Your Name" required />
    <label for="email">Email</label>
    <input id="email" type="email" name="email" placeholder="Your Email" required />
    <label for="message">Message</label>
    <textarea id="message" name="message" placeholder="Your Message" rows="5" required></textarea>
    <button type="submit">Send Message</button>
  </form>
</div>

</body>


<script>
// Hamburger toggle
const hamburger = document.getElementById('hamburger');
const navbarLinks = document.getElementById('navbar-links');

if (hamburger && navbarLinks) {
  hamburger.addEventListener('click', function (e) {
    e.stopPropagation();
    navbarLinks.classList.toggle('open');
    hamburger.textContent = navbarLinks.classList.contains('open') ? '\u2715' : '\u2630';
  });

  document.addEventListener('click', function (e) {
    if (!e.target.closest('.navbar')) {
      navbarLinks.classList.remove('open');
      hamburger.textContent = '\u2630';
    }
  });
}

// Submenu toggle
document.querySelectorAll('.has-submenu > a').forEach(link => {
  link.addEventListener('click', function (e) {
    e.preventDefault();
    const submenu = this.nextElementSibling;
    const isMobile = window.innerWidth <= 768;

    if (isMobile) {
      document.querySelectorAll('.submenu').forEach(sm => {
        if (sm !== submenu) sm.classList.remove('open');
      });
      submenu.classList.toggle('open');
    } else {
      document.querySelectorAll('.submenu').forEach(sm => {
        if (sm !== submenu) sm.style.display = 'none';
      });
      submenu.style.display = submenu.style.display === 'block' ? 'none' : 'block';
    }
  });
});

window.addEventListener('click', function (e) {
  if (!e.target.closest('.has-submenu')) {
    document.querySelectorAll('.submenu').forEach(sm => {
      sm.style.display = 'none';
      sm.classList.remove('open');
    });
  }
});
</script>

</html>
