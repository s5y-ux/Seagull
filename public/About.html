<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Learn about Seagull Technologies, a software company based in Ventura, CA." />
    <meta name="theme-color" content="#000000" />
    <title>About Seagull Technologies LLC</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');
    /* === Canvas Background === */
    canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
    }

    /* === Main Layout === */
    main {
        position: absolute;
        color: lime;
        display: grid;
        grid-template-columns: repeat(12, 1fr);
    }

    section {
        grid-column: 2/8;
        padding: 1rem;
    }

    header {
        grid-column: 2/span 5;
        padding: 2rem;
    }

    /* === Headings and Text === */
    h1, h2, h3 {
        color: #ffffff;
        background-color: rgba(0,0,0,0.65);
        font-family: "Roboto Mono", monospace;
        margin: 0.5rem 0;
    }

    p {
        color: #ffffff;
        font-family: "Roboto Mono", monospace;
    }

    /* === Splash Screen === */
    #splash-screen {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100%;
        height: 100%;
        background-color: #000;
        z-index: 9999;
        transition: opacity 0.6s ease-in-out;
    }

    #splash-screen h1 {
        font-size: 3em;
        text-align: center;
        margin-top: 20%;
    }

    #splash-screen p {
        font-size: 1.2em;
        text-align: center;
        margin-top: 0;
    }

    .typewriter p {
        overflow: hidden;
        border-right: 0.15em solid white;
        white-space: nowrap;
        margin: 0 auto;
        letter-spacing: 0.15em;
        animation: typing 2s steps(40, end), blink-caret 0.75s step-end infinite;
    }

    #splash-screen.hidden {
        opacity: 0;
        pointer-events: none;
    }

    /* Typing Animations */
    @keyframes typing { from { width: 0 } to { width: 50% } }
    @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: white; } }

    /* === Splash screen mobile === */
    @media (max-width: 768px) {
      #splash-screen h1 { font-size: 2em; margin-top: 30%; }
      #splash-screen p  { font-size: 1em; }
      @keyframes typing { from { width: 0 } to { width: 100% } }
      .overlay-content { font-size: 1.2rem; padding: 15px 25px; }
    }

    /* === Navbar: floating button only — no bar, no click interference === */
    .navbar {
        position: fixed;
        top: 1rem;
        right: 1rem;
        left: auto;
        width: auto;
        height: auto;
        background: transparent;
        z-index: 1000;
        font-family: "Roboto Mono", monospace;
        display: flex;
        align-items: center;
        padding: 0;
    }

    /* Hide logo — video is the content */
    .navbar-logo { display: none; }

    /* Hamburger always visible */
    .hamburger {
        display: block;
        background: rgba(0,0,0,0.55);
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 6px;
        color: white;
        font-size: 1.4rem;
        cursor: pointer;
        padding: 0.4rem 0.65rem;
        line-height: 1;
        z-index: 1002;
        backdrop-filter: blur(6px);
    }

    /* Nav links hidden by default on all screen sizes */
    .navbar-links {
        display: none;
        list-style: none;
        margin: 0;
        padding: 0;
    }

    /* Dropdown — compact, anchored to top-right */
    .navbar-links.open {
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 56px;
        right: 1rem;
        left: auto;
        width: 230px;
        background: rgba(0,0,0,0.88);
        backdrop-filter: blur(14px);
        padding: 0.25rem 0 0.5rem;
        gap: 0;
        z-index: 1001;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.12);
        box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }

    .navbar-links li { width: 100%; position: static; }

    .navbar-links li a {
        display: block;
        padding: 0.75rem 1.25rem;
        font-size: 0.95rem;
        color: white;
        text-decoration: none;
        border-bottom: 1px solid rgba(255,255,255,0.07);
        transition: color 0.2s;
    }

    .navbar-links li:last-child a { border-bottom: none; }
    .navbar-links li a:hover { color: #00ffff; }

    /* Submenu inside dropdown */
    .navbar-links .submenu {
        display: none;
        position: static;
        list-style: none;
        background: rgba(255,255,255,0.05);
        box-shadow: none;
        border-radius: 0;
        min-width: unset;
        padding: 0;
        margin: 0;
    }

    .navbar-links .has-submenu:hover .submenu { display: none; }
    .navbar-links .submenu.open { display: block !important; }

    .navbar-links .submenu li a {
        padding: 0.6rem 2rem;
        font-size: 0.9rem;
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .navbar-links .submenu li a:hover {
        background-color: #00ffff;
        color: black;
    }

    /* === Footer === */
    .footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        color: white;
        text-align: center;
        padding: 1rem;
        font-family: "Roboto Mono", monospace;
    }

    /* === Fullscreen Background Video === */
    .fullscreen-video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        z-index: -1;
    }

    .fullscreen-video iframe,
    #player {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 120vw;
        height: 120vh;
        transform: translate(-50%, -50%);
        border: none;
        pointer-events: none;
    }

    /* === Audio Overlay === */
    #audio-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.55);
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        z-index: 1;
        transition: opacity 0.4s ease;
    }

    #audio-overlay.hidden { opacity: 0; pointer-events: none; }

    .overlay-content {
        background: rgba(0,0,0,0.35);
        padding: 20px 40px;
        border-radius: 8px;
        font-size: 2rem;
        color: white;
        text-align: center;
    }

    /* === Contact Page === */
    .contact-page {
        background-color: #000;
        color: #fff;
        font-family: "Roboto Mono", monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem;
        min-height: 100vh;
        text-align: center;
    }

    .contact-container {
        margin-top: 140px;
        display: flex;
        justify-content: center;
        padding-bottom: 100px;
        width: 100%;
    }

    .contact-card {
        max-width: 900px;
        width: 90%;
        background: rgba(0,0,0,0.65);
        padding: 2.5rem 3rem;
        border-radius: 12px;
        box-shadow: 0 0 25px rgba(0,0,0,0.5);
        color: white;
    }

    .contact-card h1, .contact-card h2 { background: none; margin-top: 1rem; }
    .contact-card p { margin-bottom: 1.5rem; }

    .contact-form {
        display: flex;
        flex-direction: column;
        width: 100%;
    }

    .contact-form label {
        margin-top: 1rem;
        margin-bottom: 0.5rem;
        font-weight: bold;
    }

    .contact-form input,
    .contact-form textarea {
        padding: 0.8rem;
        background: rgba(255,255,255,0.05);
        border: 1px solid #444;
        border-radius: 8px;
        color: white;
        font-size: 1rem;
    }

    .contact-button {
        margin-top: 1.5rem;
        padding: 0.9rem;
        background: #00ffff;
        color: black;
        font-weight: bold;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s ease;
    }

    .contact-button:hover { background: #00bebe; }

  </style>
</head>

<body>
    <div id="splash-screen" class="splash-screen">
        <div class="typewriter">
            <h1>Welcome to our company,</h1>
            <p>Allow us to introduce ourselves...</p>
        </div>
    </div>

    <nav class="navbar">
        <div class="navbar-logo">Seagull Technologies<br/> Ventura CA.</div>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">&#9776;</button>
        <ul class="navbar-links" id="navbar-links">
            <li><a href="/index.html">Home</a></li>
            <li class="has-submenu">
                <a href="#">Products</a>
                <ul class="submenu">
                    <li><a href="https://www.politiciantradetracker.us/">Politician Trade Tracker API</a></li>
                </ul>
            </li>
            <li><a href="About.html">About</a></li>
            <li><a href="Contact.html">Contact</a></li>
            <li><a href="https://www.linkedin.com/company/seagull-technologiesl/" target="_blank" rel="noopener noreferrer">LinkedIn</a></li>
            <li><a href="https://github.com/Seagull-Technologies" target="_blank" rel="noopener noreferrer">GitHub</a></li>
        </ul>
    </nav>

    <!-- Fullscreen Background Video -->
    <div class="fullscreen-video" id="video-wrapper">
        <div id="player"></div>
    </div>

    <!-- Audio overlay sits outside the z-index:-1 container so it receives clicks properly -->
    <div id="audio-overlay">
        <div class="overlay-content">
            <p>Click to enable audio</p>
        </div>
    </div>

        <!-- Load the YouTube IFrame API -->
        <script src="https://www.youtube.com/iframe_api"></script>


    <!-- Script to hide splash screen -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const splash = document.getElementById("splash-screen");

            const dismissSplash = () => {
                splash.classList.add("hidden");
                setTimeout(() => { splash.style.display = "none"; }, 600);
            };

            if (sessionStorage.getItem('splashShown')) {
                splash.style.display = "none";
            } else {
                sessionStorage.setItem('splashShown', '1');
                setTimeout(dismissSplash, 3500);
                splash.addEventListener("click", dismissSplash);
            }
        });
    </script>
<script>
let player;

function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        videoId: 'WwtI1fUkrY4',
        playerVars: {
            autoplay: 1,
            controls: 0,
            showinfo: 0,
            modestbranding: 1,
            mute: 1,        // required for autoplay
            loop: 1,
            playlist: 'WwtI1fUkrY4',
            iv_load_policy: 3,
            rel: 0
        },
        events: {
            onReady: onPlayerReady
        }
    });
}

function onPlayerReady() {
    player.playVideo();
    player.setPlaybackQuality('hd1080');
}

/* User click → unmute. Stop propagation so it doesn't bleed into nav listeners. */
document.getElementById("audio-overlay").addEventListener("click", (e) => {
    e.stopPropagation();
    player.unMute();
    document.getElementById("audio-overlay").classList.add("hidden");
});

</script>

<script>
// Hamburger toggle
const hamburger = document.getElementById('hamburger');
const navbarLinks = document.getElementById('navbar-links');

if (hamburger && navbarLinks) {
    hamburger.addEventListener('click', function (e) {
        e.stopPropagation();
        navbarLinks.classList.toggle('open');
        hamburger.textContent = navbarLinks.classList.contains('open') ? '\u2715' : '\u2630';
    });

    document.addEventListener('click', function (e) {
        if (!e.target.closest('.navbar')) {
            navbarLinks.classList.remove('open');
            hamburger.textContent = '\u2630';
        }
    });
}

document.querySelectorAll('.has-submenu > a').forEach(link => {
    link.addEventListener('click', function (e) {
        e.preventDefault();
        const submenu = this.nextElementSibling;
        const isMobile = window.innerWidth <= 768;

        if (isMobile) {
            document.querySelectorAll('.submenu').forEach(sm => {
                if (sm !== submenu) sm.classList.remove('open');
            });
            submenu.classList.toggle('open');
        } else {
            document.querySelectorAll('.submenu').forEach(sm => {
                if (sm !== submenu) sm.style.display = 'none';
            });
            submenu.style.display = submenu.style.display === 'block' ? 'none' : 'block';
        }
    });
});

window.addEventListener('click', function (e) {
    if (!e.target.closest('.has-submenu')) {
        document.querySelectorAll('.submenu').forEach(sm => {
            sm.style.display = 'none';
            sm.classList.remove('open');
        });
    }
});
</script>

</body>
</html>
